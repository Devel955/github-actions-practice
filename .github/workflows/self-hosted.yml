name: Day 42 - Self-Hosted Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  self-hosted-job:
    runs-on: [self-hosted, linux, my-linux-runner]

    steps:
      - name: Hostname print karo
        run: |
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"

      - name: Working directory print karo
        run: |
          echo "PWD: $(pwd)"
          ls -la

      - name: File banao aur verify karo
        run: |
          FILE="$HOME/runner-demo-$(date +%Y%m%d-%H%M%S).txt"
          echo "Created by GitHub Actions self-hosted runner" > "$FILE"
          echo "Hostname: $(hostname)" >> "$FILE"
          echo "Run ID: $GITHUB_RUN_ID" >> "$FILE"
          echo "Date: $(date)" >> "$FILE"
          echo "---File contents---"
          cat "$FILE"
          echo "✅ File exist kar rahi hai: $FILE"
