name: Manual Trigger

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Kahan deploy karna hai?'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  manual-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print environment
        run: |
          echo "Deploying to: ${{ github.event.inputs.environment }}"
